function showToast(msg, isError = false) {
  let toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerText = msg;
  if (isError) toast.style.background = '#e41e3f';
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function getTimeAgo(timestamp) {
  if (!timestamp) return "Just now";
  const seconds = Math.floor((Date.now() - timestamp) / 1000);
  let interval = Math.floor(seconds / 31536000);
  if (interval >= 1) return interval + " year" + (interval > 1 ? "s" : "");
  interval = Math.floor(seconds / 2592000);
  if (interval >= 1) return interval + " month" + (interval > 1 ? "s" : "");
  interval = Math.floor(seconds / 86400);
  if (interval >= 1) return interval + " day" + (interval > 1 ? "s" : "");
  interval = Math.floor(seconds / 3600);
  if (interval >= 1) return interval + " hour" + (interval > 1 ? "s" : "");
  interval = Math.floor(seconds / 60);
  if (interval >= 1) return interval + " minute" + (interval > 1 ? "s" : "");
  return "Just now";
}

function formatDate(timestamp) {
  if (!timestamp) return "N/A";
  return new Date(timestamp).toLocaleDateString('en-US', {
    year: 'numeric',
    month: 'long',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  });
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// FIXED: Safe image saving function that doesn't crash
async function saveImageToGallery(imageUrl) {
  try {
    showToast("Saving image...");
    
    // For data URLs (base64 images)
    if (imageUrl.startsWith('data:image')) {
      // Convert base64 to blob using fetch
      const response = await fetch(imageUrl);
      const blob = await response.blob();
      
      // Create a blob URL
      const blobUrl = URL.createObjectURL(blob);
      
      // Create download link
      const link = document.createElement('a');
      link.href = blobUrl;
      link.download = `_image_${Date.now()}.jpg`;
      
      // Trigger download
      document.body.appendChild(link);
      link.click();
      
      // Clean up
      setTimeout(() => {
        document.body.removeChild(link);
        URL.revokeObjectURL(blobUrl);
      }, 500);
      
      showToast("Image saved successfully!");
    } 
    // For regular URLs
    else if (imageUrl.startsWith('http')) {
      // Try to fetch and save as blob for better compatibility
      try {
        const response = await fetch(imageUrl);
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = blobUrl;
        link.download = `metasphere_image_${Date.now()}.jpg`;
        document.body.appendChild(link);
        link.click();
        setTimeout(() => {
          document.body.removeChild(link);
          URL.revokeObjectURL(blobUrl);
        }, 500);
        showToast("Image saved successfully!");
      } catch (fetchError) {
        // Fallback to direct link
        const link = document.createElement('a');
        link.href = imageUrl;
        link.download = `metasphere_image_${Date.now()}.jpg`;
        link.target = '_blank';
        document.body.appendChild(link);
        link.click();
        setTimeout(() => document.body.removeChild(link), 100);
        showToast("Image saved successfully!");
      }
    }
    else {
      throw new Error("Unsupported image format");
    }
  } catch (err) {
    console.error("Error saving image:", err);
    showToast("Long press on the image to save it", true);
    
    // Ultimate fallback: Open in new tab with instructions
    try {
      const newWindow = window.open();
      if (newWindow) {
        newWindow.document.write(`
          <html>
            <head>
              <title>Save Image</title>
              <style>
                body {
                  display: flex;
                  justify-content: center;
                  align-items: center;
                  background: black;
                  margin: 0;
                  min-height: 100vh;
                  flex-direction: column;
                }
                img {
                  max-width: 100%;
                  max-height: 80vh;
                  object-fit: contain;
                }
                .instruction {
                  position: fixed;
                  bottom: 20px;
                  left: 0;
                  right: 0;
                  text-align: center;
                  color: white;
                  background: rgba(0,0,0,0.7);
                  padding: 10px;
                  margin: 0;
                  font-family: Arial, sans-serif;
                }
              </style>
            </head>
            <body>
              <img src="${imageUrl}" alt="Image">
              <p class="instruction">📱 Long press on the image to save it to your device</p>
            </body>
          </html>
        `);
        showToast("Long press the image in the new tab to save");
      } else {
        showToast("Please long press on the image to save it", true);
      }
    } catch (e) {
      console.error("Fallback also failed:", e);
      showToast("Unable to save image. Please try long pressing on the image.", true);
    }
  }
}

// FIXED: Full screen image viewer with working save button
function showFullScreenImage(imageSrc) {
  // Remove any existing fullscreen modal
  const existingModal = document.getElementById('fullscreenImageModal');
  if (existingModal) existingModal.remove();
  
  const modalDiv = document.createElement('div');
  modalDiv.id = 'fullscreenImageModal';
  modalDiv.style.cssText = `
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    flex-direction: column;
  `;
  
  modalDiv.innerHTML = `
    <div style="position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column;">
      <img id="fullscreenImageElement" src="${imageSrc}" style="max-width: 95%; max-height: 80%; object-fit: contain; border-radius: 8px; -webkit-touch-callout: default;" ondragstart="return false;">
      <div style="position: absolute; bottom: 30px; left: 0; right: 0; text-align: center; display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; padding: 0 20px; z-index: 10001;">
        <button id="saveImageFullscreenBtn" style="background: #1877f2; color: white; border: none; padding: 12px 24px; border-radius: 30px; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 8px;">
          <i class="fas fa-download"></i> Save to Gallery
        </button>
        <button id="closeFullScreenBtn" style="background: rgba(255,255,255,0.2); color: white; border: none; padding: 12px 24px; border-radius: 30px; font-size: 16px; cursor: pointer;">
          <i class="fas fa-times"></i> Close
        </button>
      </div>
      <div style="position: absolute; top: 20px; right: 20px;">
        <p style="color: white; font-size: 12px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 20px;">💡 Long press image to save</p>
      </div>
    </div>
  `;
  
  document.body.appendChild(modalDiv);
  
  // Save button handler
  const saveBtn = document.getElementById('saveImageFullscreenBtn');
  if (saveBtn) {
    saveBtn.onclick = async (e) => {
      e.stopPropagation();
      e.preventDefault();
      // Disable button temporarily to prevent multiple clicks
      saveBtn.disabled = true;
      saveBtn.style.opacity = '0.6';
      await saveImageToGallery(imageSrc);
      setTimeout(() => {
        saveBtn.disabled = false;
        saveBtn.style.opacity = '1';
      }, 3000);
    };
  }
  
  // Close button handler
  const closeBtn = document.getElementById('closeFullScreenBtn');
  if (closeBtn) {
    closeBtn.onclick = (e) => {
      e.stopPropagation();
      modalDiv.remove();
    };
  }
  
  // Click on background to close
  modalDiv.onclick = (e) => {
    if (e.target === modalDiv) modalDiv.remove();
  };
  
  // Prevent image click from closing modal
  const imgElement = document.getElementById('fullscreenImageElement');
  if (imgElement) {
    imgElement.onclick = (e) => e.stopPropagation();
    // Add long press hint for mobile
    imgElement.style.cursor = 'pointer';
  }
  
  // Handle escape key
  const handleEscape = (e) => {
    if (e.key === 'Escape') {
      modalDiv.remove();
      document.removeEventListener('keydown', handleEscape);
    }
  };
  document.addEventListener('keydown', handleEscape);
}

function renderBadgeHtml(badgePath, badgeColor, badgeType) {
    if (!badgePath || badgeType === 'none' || badgeType === undefined || badgeType === '') return '';
    return `<span style="display: inline-flex; margin-left: 6px; vertical-align: middle;">
        <svg viewBox="0 0 24 24" width="16" height="16" style="vertical-align: middle;">
            <path d="${badgePath}" fill="${badgeColor || '#1877f2'}"></path>

async function updateUserPostsWithNewInfo(userId, newName, newProfilePhoto) {
  try {

      const postsSnapshot = await postsRef.orderByChild('userId').equalTo(userId).once('value');

      });

        await commentsRef.update(commentUpdates);
      }
    }

// ========== FRIENDS SYSTEM ==========
async function sendFriendRequest(currentUserId, targetUserId) {
  if (currentUserId === targetUserId) {
    showToast("You cannot add yourself as a friend", true);
    return false;
  }
  
  try {
    const requestRef = database.ref(`friendRequests/${targetUserId}/${currentUserId}`);
    const existingRequest = await requestRef.once('value');
    
    if (existingRequest.exists()) {
      showToast("Friend request already sent!", true);
      return false;
    }
    
    const userSnapshot = await database.ref(`users/${currentUserId}`).once('value');
    const userData = userSnapshot.val();
    
    await requestRef.set({
      fromUserId: currentUserId,
      fromUserName: userData.name,
      fromUserPhoto: userData.profilePhoto || '',
      timestamp: Date.now(),
      status: 'pending'
    });
    
    await sendNotification(targetUserId, 'friend_request', currentUserId);
    showToast("Friend request sent!");
    return true;
  } catch (err) {
    console.error("Error sending friend request:", err);
    showToast("Failed to send friend request", true);
    return false;
  }
}

async function acceptFriendRequest(currentUserId, fromUserId) {
  try {
    const requestRef = database.ref(`friendRequests/${currentUserId}/${fromUserId}`);
    const userSnapshot = await database.ref(`users/${fromUserId}`).once('value');
    const userData = userSnapshot.val();
    
    await database.ref(`friends/${currentUserId}/${fromUserId}`).set({
      friendId: fromUserId,
      friendName: userData.name,
      friendPhoto: userData.profilePhoto || '',
      addedAt: Date.now()
    });
    
    const currentUserSnapshot = await database.ref(`users/${currentUserId}`).once('value');
    const currentUserData = currentUserSnapshot.val();
    
    await database.ref(`friends/${fromUserId}/${currentUserId}`).set({
      friendId: currentUserId,
      friendName: currentUserData.name,
      friendPhoto: currentUserData.profilePhoto || '',
      addedAt: Date.now()
    });
    
    await requestRef.remove();
    await sendNotification(fromUserId, 'friend_accept', currentUserId);
    
    showToast("Friend request accepted!");
    return true;
  } catch (err) {
    console.error("Error accepting friend request:", err);
    showToast("Failed to accept friend request", true);
    return false;
  }
}

async function rejectFriendRequest(currentUserId, fromUserId) {
  try {

// ========== CHAT SYSTEM ==========
async function sendMessage(senderId, receiverId, message, messageType = 'text', mediaData = null) {
  try {
    const chatId = [senderId, receiverId].sort().join('_');
    const messageRef = database.ref(`chats/${chatId}/messages`).push();
    
    const senderSnapshot = await database.ref(`users/${senderId}`).once('value');
    const senderData = senderSnapshot.val();
    
    const messageData = {
      senderId: senderId,
      senderName: senderData.name,
      senderPhoto: senderData.profilePhoto || '',
      message: message,
      type: messageType,
      timestamp: Date.now(),
      read: false
    };
    
    if (mediaData) {
      messageData.media = mediaData;
    }
    
    await messageRef.set(messageData);
    
    await database.ref(`chats/${chatId}/lastMessage`).set({
      text: message.substring(0, 50),
      timestamp: Date.now(),
      senderId: senderId
    });
    
    await database.ref(`chats/${chatId}/participants/${senderId}`).set(true);
    await database.ref(`chats/${chatId}/participants/${receiverId}`).set(true);
    
    await sendNotification(receiverId, 'message', senderId);
    
    return true;
  } catch (err) {
    console.error("Error sending message:", err);
    showToast("Failed to send message", true);
    return false;
  }
}

async function getChats(userId) {
  const snapshot = await database.ref('chats').once('value');
  const allChats = snapshot.val();
  if (!allChats) return [];
  
  const userChats = [];
  for (const [chatId, chatData] of Object.entries(allChats)) {
    if (chatData.participants && chatData.participants[userId]) {
      const otherParticipantId = Object.keys(chatData.participants).find(id => id !== userId);
      if (otherParticipantId) {
        const otherUserSnapshot = await database.ref(`users/${otherParticipantId}`).once('value');
        const otherUserData = otherUserSnapshot.val();
        userChats.push({
          chatId: chatId,
          otherUserId: otherParticipantId,
          otherUserName: otherUserData?.name || 'User',
          otherUserPhoto: otherUserData?.profilePhoto || '',
          lastMessage: chatData.lastMessage,
          unreadCount: 0
        });
      }
    }
  }
  return userChats;
}

async function getMessages(chatId, limit = 50) {
  const snapshot = await database.ref(`chats/${chatId}/messages`).orderByChild('timestamp').limitToLast(limit).once('value');
  const messages = snapshot.val();
  if (!messages) return [];
  return Object.entries(messages).map(([id, data]) => ({ id, ...data })).reverse();
}

async function markMessagesAsRead(chatId, userId) {
  const snapshot = await database.ref(`chats/${chatId}/messages`).once('value');
  const messages = snapshot.val();
  if (messages) {
    const updates = {};
    Object.entries(messages).forEach(([id, msg]) => {
      if (msg.senderId !== userId && !msg.read) {
        updates[`${id}/read`] = true;
      }
    });
    if (Object.keys(updates).length > 0) {
      await database.ref(`chats/${chatId}/messages`).update(updates);
    }
  }
}

function openChatModal(currentUserId, otherUserId, otherUserName, otherUserPhoto) {
  const chatId = [currentUserId, otherUserId].sort().join('_');
  const modalDiv = document.createElement('div');
  modalDiv.className = 'modal';
  modalDiv.style.display = 'flex';
  modalDiv.innerHTML = `
    <div class="modal-content" style="max-width: 500px; max-height: 80vh; display: flex; flex-direction: column;">
      <div style="display: flex; align-items: center; gap: 12px; padding-bottom: 12px; border-bottom: 1px solid #e4e6eb;">
        <div style="width: 40px; height: 40px; background: #e4e6eb; border-radius: 50%; overflow: hidden;">
          ${otherUserPhoto ? `<img src="${otherUserPhoto}" style="width:100%; height:100%; object-fit:cover;">` : `<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-weight:bold;">${otherUserName.charAt(0).toUpperCase()}</div>`}
        </div>
        <h3 style="flex: 1;">${escapeHtml(otherUserName)}</h3>
        <button id="closeChatModal" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
      </div>
      <div id="chatMessagesList" style="flex: 1; overflow-y: auto; padding: 16px 0; max-height: 400px; min-height: 300px;"></div>
      <div style="display: flex; gap: 8px; padding-top: 12px; border-top: 1px solid #e4e6eb;">
        <input type="text" id="chatMessageInput" placeholder="Type a message..." style="flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc;">
        <button id="sendChatMessageBtn" style="background:#1877f2; color:white; border:none; border-radius: 50%; width: 40px; height: 40px; cursor:pointer;"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  `;
  document.body.appendChild(modalDiv);
  
  const messagesList = document.getElementById('chatMessagesList');
  const messageInput = document.getElementById('chatMessageInput');
  const sendBtn = document.getElementById('sendChatMessageBtn');
  
  async function loadMessages() {
    const messages = await getMessages(chatId);
    messagesList.innerHTML = messages.map(msg => `
      <div style="display: flex; justify-content: ${msg.senderId === currentUserId ? 'flex-end' : 'flex-start'}; margin-bottom: 12px;">
        <div style="max-width: 70%; background: ${msg.senderId === currentUserId ? '#1877f2' : '#e4e6eb'}; color: ${msg.senderId === currentUserId ? 'white' : '#050505'}; padding: 8px 12px; border-radius: 18px;">
          ${msg.type === 'text' ? escapeHtml(msg.message) : ''}
          ${msg.media ? (msg.media.type === 'image' ? `<img src="${msg.media.data}" style="max-width: 200px; border-radius: 12px; margin-top: 5px; cursor: pointer;" onclick="showFullScreenImage('${msg.media.data}')">` : '') : ''}
          <div style="font-size: 10px; margin-top: 4px; opacity: 0.7;">${new Date(msg.timestamp).toLocaleTimeString()}</div>
        </div>
      </div>
    `).join('');
    messagesList.scrollTop = messagesList.scrollHeight;
    await markMessagesAsRead(chatId, currentUserId);
  }
  
  const messagesRef = database.ref(`chats/${chatId}/messages`);
  messagesRef.on('child_added', () => loadMessages());
  
  sendBtn.onclick = async () => {
    const message = messageInput.value.trim();
    if (!message) return;
    await sendMessage(currentUserId, otherUserId, message);
    messageInput.value = '';
    loadMessages();
  };
  
  messageInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendBtn.click();
  });
  
  document.getElementById('closeChatModal').onclick = () => {
    messagesRef.off();
    modalDiv.remove();
  };
  
  loadMessages();
}

// ========== USER SEARCH ==========
async function searchUsers(searchTerm) {
  if (!searchTerm || searchTerm.length < 2) return [];
  
  const snapshot = await database.ref('users').once('value');
  const users = snapshot.val();
  if (!users) return [];
  
  const searchLower = searchTerm.toLowerCase();
  const results = [];
  
  for (const [userId, userData] of Object.entries(users)) {
    if (userData.name && userData.name.toLowerCase().includes(searchLower)) {
      results.push({
        userId: userId,
        name: userData.name,
        email: userData.email,
        profilePhoto: userData.profilePhoto || '',
        bio: userData.bio || ''
      });
    }
  }
  
  return results.slice(0, 10);
}

// ========== ACTIVITY STATUS ==========
function updateUserActivity(userId) {
  database.ref(`users/${userId}`).update({
    lastSeen: Date.now(),
    isOnline: true
  });
  
  database.ref(`users/${userId}/isOnline`).onDisconnect().set(false);
  database.ref(`users/${userId}/lastSeen`).onDisconnect().set(Date.now());
}

async function getUserStatus(userId) {
  const snapshot = await database.ref(`users/${userId}`).once('value');
  const userData = snapshot.val();
  if (!userData) return { isOnline: false, lastSeen: null };
  
  const isOnline = userData.isOnline === true;
  const lastSeen = userData.lastSeen;
  const timeSinceLastSeen = lastSeen ? Date.now() - lastSeen : Infinity;
  
  if (!isOnline && timeSinceLastSeen < 300000) {
    return { isOnline: true, lastSeen: lastSeen };
  }
  
  return { isOnline: isOnline, lastSeen: lastSeen };
}

// ========== HASHTAG SYSTEM ==========
function extractHashtags(text) {
  const hashtagRegex = /#[\w\u0590-\u05fe]+/g;
  const matches = text.match(hashtagRegex);
  return matches ? matches.map(tag => tag.toLowerCase()) : [];
}

async function saveHashtags(postId, hashtags) {
  if (!hashtags || hashtags.length === 0) return;
  
  const updates = {};
  hashtags.forEach(tag => {
    updates[`${tag}/${postId}`] = true;
  });
  
  await database.ref('hashtags').update(updates);
}

async function getPostsByHashtag(hashtag) {
  const normalizedTag = hashtag.toLowerCase();
  const snapshot = await database.ref(`hashtags/${normalizedTag}`).once('value');
  const posts = snapshot.val();
  
  if (!posts) return [];
  
  const postIds = Object.keys(posts);
  const postsData = [];
  
  for (const postId of postIds) {
    const postSnapshot = await postsRef.child(postId).once('value');
    if (postSnapshot.exists()) {
      postsData.push({ id: postId, ...postSnapshot.val() });
    }
  }
  
  return postsData;
}

function renderUserPostsPreview(posts, authorId, currentUserId) {
  if (!posts) return '<div style="text-align:center; color:#65676b; padding:20px;">No posts yet</div>';
  
  const postsArray = Object.entries(posts).map(([id, data]) => ({ id, ...data }));
  postsArray.sort((a,b) => b.timestamp - a.timestamp);
  const recentPosts = postsArray.slice(0, 5);
  
  let html = '';
  recentPosts.forEach(post => {
    const timeAgo = getTimeAgo(post.timestamp);
    const postContent = post.content || '';
    html += `
      <div style="background: #f0f2f5; border-radius: 12px; padding: 12px; margin-bottom: 10px;">
        <div style="font-size: 13px; color: #65676b; margin-bottom: 8px;">${timeAgo}</div>
        <div style="font-size: 14px; color: #050505;">${escapeHtml(postContent.substring(0, 150))}${postContent.length > 150 ? '...' : ''}</div>
        ${post.media && post.media.type === 'image' ? `<img src="${post.media.data}" style="max-width:100%; max-height:100px; border-radius:8px; margin-top:8px; cursor:pointer;" onclick="showFullScreenImage('${post.media.data}')">` : ''}
        <div style="font-size: 12px; color: #65676b; margin-top: 8px;">
          <i class="far fa-thumbs-up"></i> ${post.likeCount || 0} likes
        </div>
      </div>
    `;
  });
  return html;
}

          ${currentPhoto ? `<img src="${currentPhoto}" style="width:100%; height:100%; object-fit:cover;">` : (currentName ? currentName.charAt(0).toUpperCase() : 'U')}

      <div id="editProfileMsg" style="color:red; font-size:12px;"></div>
    </div>
  `;
  document.body.appendChild(modalDiv);
  
  let newPhotoBase64 = currentPhoto;
  
  document.getElementById('changePhotoInEdit').onclick = () => {
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*';
    fileInput.onchange = async (e) => {
      const file = e.target.files[0];
      if (file) {
        if (file.size > 2 * 1024 * 1024) {
          showToast("Profile photo too large! Max 2MB", true);
          return;
        }
        newPhotoBase64 = await fileToBase64(file);
        const previewDiv = modalDiv.querySelector('div[style*="width: 70px"]');

          previewDiv.innerHTML = `<img src="${newPhotoBase64}" style="width:100%; height:100%; object-fit:cover;">`;

      await database.ref('users/' + user.uid).update({ 
        name: newName,
        profilePhoto: newPhotoBase64 || currentPhoto
      });
      
      await updateUserPostsWithNewInfo(user.uid, newName, newPhotoBase64 || currentPhoto);
      
      showToast("Profile updated across all posts!");
      modalDiv.remove();
      if (updateUICallback) updateUICallback();
    } catch (err) {
      document.getElementById('editProfileMsg').innerText = err.message;
    }
  };
}

  // Create Post Modal
  async function showCreatePostModal(uid, name, avatarLetter) {
    const userDataSnap = await database.ref('users/' + uid).once('value');
    const userData = userDataSnap.val();
    const profilePhoto = userData?.profilePhoto || '';
    const badgePath = userData?.badgePath || '';
    const badgeColor = userData?.badgeColor || '#1877f2';
    const badgeType = userData?.badgeType || 'none';
    
    const badgeHtml = renderBadgeHtml(badgePath, badgeColor, badgeType);
    
    const modalDiv = document.createElement('div');
    modalDiv.className = 'modal';
    modalDiv.style.display = 'flex';
    modalDiv.innerHTML = `
      <div class="modal-content" style="max-width: 600px;">
        <h3>Create post</h3>
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
          <div style="width: 40px; height: 40px; background: linear-gradient(145deg, #42b72a, #36a420); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px; overflow: hidden;">
            ${profilePhoto ? `<img src="${profilePhoto}" style="width:100%; height:100%; object-fit:cover;">` : avatarLetter}
          </div>
          <div style="display: flex; align-items: center; gap: 4px;">
            <strong>${escapeHtml(name)}</strong>
            ${badgeHtml}
          </div>
        </div>
        <textarea id="postTextarea" placeholder="Share your thoughts, ${escapeHtml(name.split(' ')[0])}..." rows="3" style="width:100%; padding:12px; border-radius:12px; border:1px solid #ccc; margin-bottom:12px;"></textarea>
        <div class="media-upload-area" style="border:2px dashed #ddd; border-radius:12px; padding:20px; text-align:center; cursor:pointer; margin-bottom:12px;" id="mediaUploadArea">
          <i class="fas fa-cloud-upload-alt" style="font-size:32px; color:#1877f2;"></i>
          <p style="margin-top:8px;">Click to add photo or video</p>
          <input type="file" id="postMediaInput" accept="image/*,video/*" style="display:none;">
        </div>
        <div id="mediaPreview" style="display:none; margin-bottom:12px;">
          <div style="position:relative;">
            <img id="mediaPreviewImg" style="max-width:100%; max-height:200px; border-radius:12px; cursor:pointer;">
            <video id="mediaPreviewVideo" controls style="max-width:100%; max-height:200px; border-radius:12px; display:none;"></video>
            <button id="removeMediaBtn" style="position:absolute; top:5px; right:5px; background:rgba(0,0,0,0.7); color:white; border:none; border-radius:50%; width:30px; height:30px; cursor:pointer;">✕</button>
          </div>
        </div>
        <div class="modal-buttons">
          <button id="cancelPostBtn">Cancel</button>
          <button id="sharePostBtn" style="background:#1877f2; color:white;">Post</button>
        </div>
      </div>
    `;
    document.body.appendChild(modalDiv);
    
    let selectedMedia = null;
    let mediaType = null;
    
    const mediaUploadArea = modalDiv.querySelector('#mediaUploadArea');
    const fileInput = modalDiv.querySelector('#postMediaInput');
    const mediaPreview = modalDiv.querySelector('#mediaPreview');
    const mediaPreviewImg = modalDiv.querySelector('#mediaPreviewImg');
    const mediaPreviewVideo = modalDiv.querySelector('#mediaPreviewVideo');
    const removeMediaBtn = modalDiv.querySelector('#removeMediaBtn');
    
    if (mediaUploadArea) mediaUploadArea.addEventListener('click', () => fileInput.click());
    if (fileInput) {
      fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file) {
          if (file.size > 10 * 1024 * 1024) {
            showToast("File too large! Max 10MB", true);
            return;
          }
          selectedMedia = await fileToBase64(file);
          mediaType = file.type.startsWith('image/') ? 'image' : 'video';
          
          if (mediaType === 'image') {
            mediaPreviewImg.src = selectedMedia;
            mediaPreviewImg.style.display = 'block';
            mediaPreviewVideo.style.display = 'none';
            mediaPreviewImg.onclick = () => showFullScreenImage(selectedMedia);
          } else {
            mediaPreviewVideo.src = selectedMedia;
            mediaPreviewVideo.style.display = 'block';
            mediaPreviewImg.style.display = 'none';
          }
          mediaPreview.style.display = 'block';
          mediaUploadArea.style.display = 'none';
        }
      });
    }
    
    if (removeMediaBtn) {
      removeMediaBtn.addEventListener('click', () => {
        selectedMedia = null;
        mediaType = null;
        mediaPreview.style.display = 'none';
        mediaUploadArea.style.display = 'block';
        fileInput.value = '';
      });
    }
    
    const cancelBtn = modalDiv.querySelector('#cancelPostBtn');
    if (cancelBtn) cancelBtn.onclick = () => modalDiv.remove();
    
    const shareBtn = modalDiv.querySelector('#sharePostBtn');
    if (shareBtn) {
      shareBtn.onclick = async () => {
        const content = modalDiv.querySelector('#postTextarea').value.trim();
        if (!content && !selectedMedia) { 
          showToast("Write something or add media", true); 
          return; 
        }
        try {
          const hashtags = extractHashtags(content);
          const postData = { 
            userId: uid, 
            authorName: name, 
            authorPhoto: profilePhoto,
            authorAvatar: avatarLetter,
            content: content || "", 
            timestamp: Date.now(), 
            likes: {}, 
            likeCount: 0,
            hashtags: hashtags
          };
          
          if (selectedMedia) {
            postData.media = { data: selectedMedia, type: mediaType };
          }
          
          const newPostRef = await postsRef.push(postData);
          
          if (hashtags.length > 0) {
            await saveHashtags(newPostRef.key, hashtags);
          }
          
          const userRef = database.ref('users/' + uid);
          const userSnap = await userRef.once('value');
          const currentCount = userSnap.val()?.postsCount || 0;
          await userRef.update({ postsCount: currentCount + 1 });
          
          showToast("Post shared!");
          modalDiv.remove();
        } catch (err) { 
          showToast("Error posting", true);
          console.error(err);
        }
      };
    }
  }

  async function deletePost(postId) {
    try {
      await commentsRef.child(postId).remove();
      await postsRef.child(postId).remove();
      await database.ref(`postReactions/${postId}`).remove();
      
      const userRef = database.ref('users/' + userId);
      const userSnap = await userRef.once('value');
      const currentCount = userSnap.val()?.postsCount || 0;
      await userRef.update({ postsCount: Math.max(0, currentCount - 1) });
      
      showToast("Post deleted successfully");
    } catch (err) {
      showToast("Error deleting post", true);
      console.error(err);
    }
  }

  async function getUserBadgePath(uid) {
    const snapshot = await database.ref('users/' + uid).once('value');
    const data = snapshot.val();
    return data ? { path: data.badgePath || '', type: data.badgeType || 'none', color: data.badgeColor || '#1877f2' } : { path: '', type: 'none', color: '#1877f2' };
  }

  function showReactionPicker(button, postId) {
    const existingPicker = document.querySelector('.reaction-picker');
    if (existingPicker) existingPicker.remove();
    
    const picker = document.createElement('div');
    picker.className = 'reaction-picker';
    picker.style.cssText = 'position:absolute; background:white; border-radius:30px; padding:8px; box-shadow:0 2px 12px rgba(0,0,0,0.2); display:flex; gap:8px; z-index:1000;';
    
    Object.entries(REACTION_ICONS).forEach(([type, icon]) => {
      const reactionBtn = document.createElement('button');
      reactionBtn.textContent = icon;
      reactionBtn.style.cssText = 'width:40px; height:40px; border:none; border-radius:50%; cursor:pointer; font-size:24px; background:transparent; transition:transform 0.2s;';
      reactionBtn.onmouseenter = () => reactionBtn.style.transform = 'scale(1.2)';
      reactionBtn.onmouseleave = () => reactionBtn.style.transform = 'scale(1)';
      reactionBtn.onclick = async () => {
        await addReaction(userId, postId, type);
        picker.remove();
        loadPostsAndComments();
      };
      picker.appendChild(reactionBtn);
    });
    
    const rect = button.getBoundingClientRect();
    picker.style.position = 'fixed';
    picker.style.top = `${rect.top - 50}px`;
    picker.style.left = `${rect.left}px`;
    document.body.appendChild(picker);
    
    setTimeout(() => {
      document.addEventListener('click', function removePicker(e) {
        if (!picker.contains(e.target)) {
          picker.remove();
          document.removeEventListener('click', removePicker);
        }
      });
    }, 0);
  }

  function loadPostsAndComments() {
    if (!postsRef) return;
    
    postsRef.orderByChild('timestamp').limitToLast(30).on('value', async (snapshot) => {
      const postsDiv = document.getElementById('postsList');
      if (!postsDiv) return;
      const postsData = snapshot.val();
      if (!postsData) { postsDiv.innerHTML = `<div style="background:white; border-radius:20px; padding:28px; text-align:center;">✨ No posts yet. Be the first to share!</div>`; return; }
      let postsArray = Object.entries(postsData).map(([id, data]) => ({ id, ...data }));
      postsArray.sort((a,b) => b.timestamp - a.timestamp);
      
      let html = '';
      for (let post of postsArray) {
        const postId = post.id;
        const likeCount = post.likeCount || 0;
        const userLiked = post.likes && post.likes[userId];
        const likeIcon = userLiked ? '<i class="fas fa-thumbs-up" style="color:#1877f2;"></i>' : '<i class="far fa-thumbs-up"></i>';
        const timeAgo = getTimeAgo(post.timestamp);
        const hasAuthorPhoto = post.authorPhoto && post.authorPhoto !== '';
        const isAuthor = post.userId === userId;
        const deleteButton = isAuthor ? `<button class="delete-post-btn" data-id="${postId}" title="Delete post"><i class="fas fa-trash-alt"></i></button>` : '';
        
        const userReaction = await getUserReaction(userId, postId);
        const reactionDisplay = userReaction ? `${REACTION_ICONS[userReaction]} ` : '';
        
        const sharedInfo = post.isShared ? `<div style="background:#f0f2f5; border-radius:12px; padding:12px; margin:8px 0; font-size:13px; color:#65676b;">
          <i class="fas fa-share"></i> Shared from ${escapeHtml(post.originalAuthor)}
          <div style="margin-top:8px; padding:8px; background:white; border-radius:8px;">"${escapeHtml(post.originalContent ? post.originalContent.substring(0, 100) : '')}${post.originalContent && post.originalContent.length > 100 ? '...' : ''}"</div>
          ${post.originalMedia ? (post.originalMedia.type === 'image' ? `<img src="${post.originalMedia.data}" style="max-width:100%; max-height:150px; border-radius:8px; margin-top:8px; cursor:pointer;" onclick="showFullScreenImage('${post.originalMedia.data}')">` : '') : ''}
        </div>` : '';
        
        let mediaHtml = '';
        if (post.media && post.media.data) {
          if (post.media.type === 'image') {
            mediaHtml = `<div class="media-preview" style="margin:12px 0;">
              <img src="${post.media.data}" alt="Post image" style="max-width:100%; max-height:400px; border-radius:16px; width:100%; object-fit:cover; cursor:pointer;" onclick="showFullScreenImage('${post.media.data}')">
              <div style="margin-top:8px; display:flex; gap:10px; justify-content:flex-end;">
                <button class="save-image-btn" data-image="${post.media.data}" style="background:#1877f2; color:white; border:none; border-radius:20px; padding:5px 12px; font-size:12px; cursor:pointer;"><i class="fas fa-download"></i> Save Image</button>
              </div>
            </div>`;
          } else if (post.media.type === 'video') {
            mediaHtml = `<div class="media-preview" style="margin:12px 0;">
              <video controls src="${post.media.data}" style="max-width:100%; max-height:400px; border-radius:16px; width:100%;"></video>
            </div>`;
          }
        }
        
        let hashtagsHtml = '';
        if (post.hashtags && post.hashtags.length > 0) {
          hashtagsHtml = `<div style="margin:8px 0;">
            ${post.hashtags.map(tag => `<span style="color:#1877f2; cursor:pointer; margin-right:8px;" onclick="window.searchByHashtag('${tag}')">${escapeHtml(tag)}</span>`).join('')}
          </div>`;
        }
        
        const badgeInfo = await getUserBadgePath(post.userId);
        const badgeHtml = renderBadgeHtml(badgeInfo.path, badgeInfo.color, badgeInfo.type);
        
        const isFriendWithAuthor = await isFriend(userId, post.userId);
        const friendRequestBtn = (!isAuthor && !isFriendWithAuthor && post.userId !== userId) ? 
          `<button class="friend-request-btn" data-userid="${post.userId}" style="margin-left:10px; background:#1877f2; color:white; border:none; border-radius:20px; padding:4px 12px; font-size:12px; cursor:pointer;"><i class="fas fa-user-plus"></i> Add Friend</button>` : '';
        
        html += `
          <div class="post-card" data-postid="${postId}">
            <div class="post-header">
              <div class="post-author-pic" style="cursor:pointer;" onclick="window.showFullProfileFromSearch('${post.userId}')">
                ${hasAuthorPhoto ? `<img src="${post.authorPhoto}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">` : escapeHtml(post.authorAvatar || (post.authorName ? post.authorName.charAt(0).toUpperCase() : 'U'))}
              </div>
              <div>
                <div class="post-author-name" style="display: flex; align-items: center; gap: 4px;">
                  <span style="cursor:pointer;" onclick="window.showFullProfileFromSearch('${post.userId}')">${escapeHtml(post.authorName)}</span>
                  ${badgeHtml}
                  ${friendRequestBtn}
                </div>
                <div class="post-time">${timeAgo} · <i class="fas fa-globe-americas"></i></div>
              </div>
              ${deleteButton}
              <div style="margin-left:auto; display:flex; gap:8px;">
                <button class="save-post-btn" data-id="${postId}" style="background:none; border:none; cursor:pointer; color:#65676b;" title="Save post"><i class="far fa-bookmark"></i></button>
                <button class="share-post-btn" data-id="${postId}" style="background:none; border:none; cursor:pointer; color:#65676b;" title="Share post"><i class="fas fa-share-alt"></i></button>
                <button class="report-post-btn" data-id="${postId}" style="background:none; border:none; cursor:pointer; color:#65676b;" title="Report post"><i class="fas fa-flag"></i></button>

            </div>
            <div class="post-message">${escapeHtml(post.content)}</div>
            ${hashtagsHtml}

                  <span class="like-icon">${likeIcon}</span> ${reactionDisplay || 'Like'}

          const targetUserId = btn.getAttribute('data-userid');
          const targetUserName = btn.getAttribute('data-username');
          const targetUserPhoto = btn.getAttribute('data-userphoto');
          openChatModal(userId, targetUserId, targetUserName, targetUserPhoto);
        });
      });
      
      document.querySelectorAll('.save-post-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const pid = btn.getAttribute('data-id');
          const postData = postsData[pid];
          await savePost(userId, pid, postData);
          const icon = btn.querySelector('i');
          if (icon) {
            icon.className = 'fas fa-bookmark';
            btn.style.color = '#1877f2';
          }
          setTimeout(() => {
            if (icon) icon.className = 'far fa-bookmark';
            btn.style.color = '#65676b';
          }, 2000);
        });
      });
      
      document.querySelectorAll('.share-post-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const pid = btn.getAttribute('data-id');
          const postData = postsData[pid];
          await sharePost(userId, pid, postData);
        });
      });
      
      document.querySelectorAll('.report-post-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const pid = btn.getAttribute('data-id');
          const reason = prompt("Why are you reporting this post?");
          if (reason && reason.trim()) {
            await reportContent(userId, 'post', pid, reason);
          }
        });
      });

      document.querySelectorAll('.comment-toggle-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const pid = btn.getAttribute('data-id');
          const section = document.getElementById(`commentSection-${pid}`);
          if (section.style.display === 'none') {
            section.style.display = 'block';
            loadCommentsForPost(pid);
          } else { section.style.display = 'none'; }
        });
      });

      document.querySelectorAll('.post-comment-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const pid = btn.getAttribute('data-id');
          const inputField = document.getElementById(`commentInput-${pid}`);
          const text = inputField.value.trim();
          if (!text) return;
          
          const userSnap = await database.ref('users/' + userId).once('value');
          const userData = userSnap.val();
          const userPhoto = userData?.profilePhoto || '';
          
          try {
            const newCommentRef = await commentsRef.child(pid).push({
              userId: userId,
              userName: displayName,
              userPhoto: userPhoto,
              userAvatar: avatarLetter,
              text: text,
              timestamp: Date.now()
            });
            
            const postData = postsData[pid];
            if (postData && postData.userId !== userId) {
              await sendNotification(postData.userId, 'comment', userId, pid, newCommentRef.key);
            }
            
            inputField.value = '';
            loadCommentsForPost(pid);
            showToast("Comment added");
          } catch(err) { showToast("Error adding comment", true); }
        });
      });
    });
  }

  function loadCommentsForPost(postId) {
    if (!commentsRef) return;
    
    commentsRef.child(postId).orderByChild('timestamp').on('value', async (snap) => {
      const commentListDiv = document.getElementById(`commentList-${postId}`);
      const countSpan = document.querySelector(`.comment-count-${postId}`);
      if (!commentListDiv) return;
      const comments = snap.val();
      let commentsHtml = '';
      let count = 0;
      if (comments) {
        const arr = Object.values(comments);
        count = arr.length;
        for (let c of arr) {
          const hasUserPhoto = c.userPhoto && c.userPhoto !== '';
          const badgeInfo = await getUserBadgePath(c.userId);
          const badgeHtml = renderBadgeHtml(badgeInfo.path, badgeInfo.color, badgeInfo.type);
          
          commentsHtml += `
            <div class="single-comment">
              <div style="display: flex; align-items: center; gap: 8px;">
                <div style="width: 28px; height: 28px; background: #e4e6eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; overflow: hidden;">
                  ${hasUserPhoto ? `<img src="${c.userPhoto}" style="width:100%; height:100%; object-fit:cover;">` : escapeHtml(c.userAvatar || (c.userName ? c.userName.charAt(0).toUpperCase() : 'U'))}
                </div>
                <div style="display: flex; align-items: center; gap: 4px;">
                  <b>${escapeHtml(c.userName)}</b>
                  ${badgeHtml}
                </div>
              </div>
              <div style="margin-left: 36px;">${escapeHtml(c.text)}</div>
            </div>
          `;
        }
      }
      if (countSpan) countSpan.innerText = count;
      commentListDiv.innerHTML = commentsHtml || '<div style="font-size:12px; color:#65676b;">No comments yet.</div>';
    });
  }

  loadPostsAndComments();
  
  database.ref(`notifications/${userId}`).on('value', () => {
    loadNotifications();
  });
}

// Make functions globally available
window.showFullScreenImage = showFullScreenImage;
window.saveImageToGallery = saveImageToGallery;

window.showFullProfileFromSearch = async function(userId) {
  const currentUser = auth.currentUser;
  if (currentUser) {
    await showFullProfile(currentUser, userId);
  }
};

window.handleNotificationClick = async function(notificationId, type, fromUserId, postId) {
  const currentUser = auth.currentUser;
  if (!currentUser) return;
  
  await markNotificationAsRead(currentUser.uid, notificationId);
  
  if (type === 'friend_request') {
    const accept = confirm(`Friend request from user. Accept?`);
    if (accept) {
      await acceptFriendRequest(currentUser.uid, fromUserId);
    } else {
      await rejectFriendRequest(currentUser.uid, fromUserId);
    }
  } else if (type === 'message') {
    const otherUserSnapshot = await database.ref(`users/${fromUserId}`).once('value');
    const otherUserData = otherUserSnapshot.val();
    openChatModal(currentUser.uid, fromUserId, otherUserData.name, otherUserData.profilePhoto);
  } else if (postId) {
    showFullProfile(currentUser, fromUserId);
  }
  
  const notificationsPanel = document.getElementById('notificationsPanel');
  if (notificationsPanel && notificationsPanel.style.display !== 'none') {
    const notifications = await getNotifications(currentUser.uid);
    const notificationsList = document.getElementById('notificationsList');
    if (notificationsList) {
      notificationsList.innerHTML = notifications.map(n => `
        <div style="display:flex; align-items:center; gap:12px; padding:12px; background:${n.read ? 'transparent' : '#e7f3ff'}; border-radius:12px; margin-bottom:8px;">
          <div style="width:40px; height:40px; background:#e4e6eb; border-radius:50%; overflow:hidden;">
            ${n.fromUserPhoto ? `<img src="${n.fromUserPhoto}" style="width:100%; height:100%; object-fit:cover;">` : `<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-weight:bold;">${n.fromUserName.charAt(0).toUpperCase()}</div>`}
          </div>
          <div style="flex:1;">
            <div><strong>${escapeHtml(n.fromUserName)}</strong> ${getNotificationMessage(n.type)}</div>
            <div style="font-size:11px; color:#65676b;">${getTimeAgo(n.timestamp)}</div>
          </div>
        </div>
      `).join('');
    }
  }
};

window.searchByHashtag = async function(hashtag) {
  const posts = await getPostsByHashtag(hashtag);
  showToast(`Found ${posts.length} posts with ${hashtag}`);
};

function getNotificationMessage(type) {
  const messages = {
    'like': 'liked your post',
    'comment': 'commented on your post',
    'reaction': 'reacted to your post',
    'friend_request': 'sent you a friend request',
    'friend_accept': 'accepted your friend request',
    'message': 'sent you a message'
  };
  return messages[type] || 'interacted with you';
}

function showSavedPostsModal(savedPosts) {
  const modalDiv = document.createElement('div');
  modalDiv.className = 'modal';
  modalDiv.style.display = 'flex';
  modalDiv.innerHTML = `
    <div class="modal-content" style="max-width: 600px; max-height: 80vh; overflow-y: auto;">
      <h3 style="margin-bottom: 16px;">Saved Posts</h3>
      <div id="savedPostsList">
        ${savedPosts.map(post => `
          <div style="background: #f0f2f5; border-radius: 12px; padding: 12px; margin-bottom: 10px;">
            <div style="font-size: 13px; color: #65676b; margin-bottom: 8px;">${getTimeAgo(post.savedAt)}</div>
            <div style="font-size: 14px; color: #050505;">${escapeHtml(post.postData.content ? post.postData.content.substring(0, 150) : '')}${post.postData.content && post.postData.content.length > 150 ? '...' : ''}</div>
            ${post.postData.media && post.postData.media.type === 'image' ? `<img src="${post.postData.media.data}" style="max-width:100%; max-height:150px; border-radius:12px; margin-top:8px; cursor:pointer;" onclick="showFullScreenImage('${post.postData.media.data}')">` : ''}
            ${post.postData.media && post.postData.media.type === 'video' ? `<video controls src="${post.postData.media.data}" style="max-width:100%; max-height:150px; border-radius:12px; margin-top:8px;"></video>` : ''}
          </div>
        `).join('')}
      </div>
      <div class="modal-buttons">
        <button id="closeSavedModal">Close</button>
      </div>
    </div>
  `;
  document.body.appendChild(modalDiv);
  const closeBtn = document.getElementById('closeSavedModal');
  if (closeBtn) closeBtn.onclick = () => modalDiv.remove();
}

function showFriendsModal(friends) {
  const modalDiv = document.createElement('div');
  modalDiv.className = 'modal';
  modalDiv.style.display = 'flex';
  modalDiv.innerHTML = `
    <div class="modal-content" style="max-width: 500px; max-height: 80vh; overflow-y: auto;">
      <h3 style="margin-bottom: 16px;">My Friends (${friends.length})</h3>
      <div id="friendsList">
        ${friends.map(friend => `
          <div style="display: flex; align-items: center; gap: 12px; padding: 10px; border-bottom: 1px solid #e4e6eb; cursor: pointer;" onclick="window.showFullProfileFromSearch('${friend.friendId}')">
            <div style="width: 50px; height: 50px; background: #e4e6eb; border-radius: 50%; overflow: hidden;">
              ${friend.friendPhoto ? `<img src="${friend.friendPhoto}" style="width:100%; height:100%; object-fit:cover;">` : `<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-weight:bold;">${friend.friendName.charAt(0).toUpperCase()}</div>`}
            </div>
            <div>
              <div style="font-weight: 600;">${escapeHtml(friend.friendName)}</div>
              <div style="font-size: 12px; color: #65676b;">Friend since ${new Date(friend.addedAt).toLocaleDateString()}</div>
            </div>
            <button class="chat-friend-btn" data-userid="${friend.friendId}" data-username="${escapeHtml(friend.friendName)}" data-userphoto="${friend.friendPhoto || ''}" style="margin-left:auto; background:#1877f2; color:white; border:none; border-radius:20px; padding:5px 12px; cursor:pointer;"><i class="fas fa-comment"></i> Chat</button>
          </div>
        `).join('')}
      </div>
      <div class="modal-buttons">
        <button id="closeFriendsModal">Close</button>
      </div>
    </div>
  `;
  document.body.appendChild(modalDiv);
  
  document.querySelectorAll('.chat-friend-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const targetUserId = btn.getAttribute('data-userid');
      const targetUserName = btn.getAttribute('data-username');
      const targetUserPhoto = btn.getAttribute('data-userphoto');
      const currentUser = auth.currentUser;
      if (currentUser) {
        modalDiv.remove();
        openChatModal(currentUser.uid, targetUserId, targetUserName, targetUserPhoto);
      }
    });
  });
  
  const closeBtn = document.getElementById('closeFriendsModal');
  if (closeBtn) closeBtn.onclick = () => modalDiv.remove();
}

// Apply dark mode on load
applyDarkMode();

// ========== AUTH STATE ==========
auth.onAuthStateChanged(async (user) => {
  if (user) {
    if (!user.displayName) {
      let derivedName = user.email?.split('@')[0] || "User";
      await user.updateProfile({ displayName: derivedName });
    }
    await updateUserProfileInDB(user);
    renderFeed(user);
  } else { 
    renderLogin(); 
  }
});
</script>
